# ============================================================
# Nginx config for NepalgGig — Contabo VPS
# SSL via Let's Encrypt (certbot)
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m      rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=magic_limit:10m    rate=3r/m;   # magic link
limit_req_zone $binary_remote_addr zone=general_limit:10m  rate=60r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream ─────────────────────────────────────────────
upstream nepalgig_app {
  server 127.0.0.1:3000;
  keepalive 64;
}

# ── HTTP → HTTPS Redirect ────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name nepalgig.com www.nepalgig.com;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS Main ────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name nepalgig.com www.nepalgig.com;

  # SSL
  ssl_certificate     /etc/letsencrypt/live/nepalgig.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nepalgig.com/privkey.pem;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_stapling        on;
  ssl_stapling_verify on;

  # Security headers
  add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options             "SAMEORIGIN" always;
  add_header X-Content-Type-Options      "nosniff" always;
  add_header X-XSS-Protection           "1; mode=block" always;
  add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

  # Connection limit
  limit_conn conn_limit 20;

  # Hide Nginx version
  server_tokens off;

  # Max body size (for file uploads)
  client_max_body_size 10M;

  # Timeouts
  client_body_timeout   12s;
  client_header_timeout 12s;
  send_timeout          10s;

  # ── Static files (Next.js) ──────────────────────────────
  location /_next/static/ {
    alias /app/.next/static/;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /public/ {
    alias /app/public/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # ── Magic link endpoint (very strict rate limit) ─────────
  location /api/auth/magic {
    limit_req zone=magic_limit burst=2 nodelay;
    limit_req_status 429;

    proxy_pass         http://nepalgig_app;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # ── Auth endpoints (strict rate limit) ─────────────────
  location /api/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;
    limit_req_status 429;

    proxy_pass         http://nepalgig_app;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── tRPC API ────────────────────────────────────────────
  location /api/trpc/ {
    limit_req zone=api_limit burst=10 nodelay;
    limit_req_status 429;

    proxy_pass         http://nepalgig_app;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # ── Health check (no rate limit) ────────────────────────
  location /api/health {
    proxy_pass http://nepalgig_app;
    access_log off;
  }

  # ── Block common attack paths ────────────────────────────
  location ~* \.(env|git|sql|bak|log|sh)$ {
    return 403;
  }

  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # ── Main app ─────────────────────────────────────────────
  location / {
    limit_req zone=general_limit burst=20 nodelay;

    proxy_pass         http://nepalgig_app;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout  5s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;
  }

  # ── Error pages ──────────────────────────────────────────
  error_page 429 /429.html;
  location = /429.html {
    return 429 '{"error":"Too many requests. Please slow down.","code":"RATE_LIMITED"}';
    add_header Content-Type application/json;
  }

  error_page 502 503 504 /50x.html;
  location = /50x.html {
    return 503 '{"error":"Service temporarily unavailable","code":"SERVER_ERROR"}';
    add_header Content-Type application/json;
  }
}
