version: '3.9'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 15 with RLS
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nepalgig_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nepalgig}
      POSTGRES_USER: ${POSTGRES_USER:-nepalgig_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"    # bind to localhost ONLY (never expose to internet)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nepalgig_user} -d ${POSTGRES_DB:-nepalgig}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nepalgig_internal
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c log_min_duration_statement=1000
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c row_security=on

  # ──────────────────────────────────────────────
  # Next.js App (PM2 managed in container)
  # ──────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nepalgig_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nepalgig_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nepalgig}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://nepalgig.com}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@nepalgig.com}
      APP_BASE_URL: ${APP_BASE_URL:-https://nepalgig.com}
      RATE_LIMIT_MAGIC_LINK: ${RATE_LIMIT_MAGIC_LINK:-3}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-5}
    ports:
      - "127.0.0.1:3000:3000"    # Nginx proxies, never expose directly
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nepalgig_internal
    volumes:
      - uploads:/app/uploads

  # ──────────────────────────────────────────────
  # Redis (rate limiting, session cache)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nepalgig_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - nepalgig_internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

networks:
  nepalgig_internal:
    driver: bridge
    internal: false   # app needs internet for email
